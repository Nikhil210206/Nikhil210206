<style>
  .bgfill { fill:#ffffff; stroke:#d0d7de; stroke-width:1.5; }
  .sep    { stroke:#d0d7de; stroke-width:1; }
  .txt    { fill:#24292f; }
  .key    { fill:#bc4c00; font-weight:600; }
  .val    { fill:#bc4c00; font-weight:700; }
  .accent { fill:#d1490b; font-weight:700; }
  .art    { fill:#d1490b; }
  .dim    { fill:#57606a; }
  .cursor { fill:#d1490b; opacity:0; animation: blink 1.1s steps(2, start) infinite; animation-delay:7.27s; }
  .al { animation: lineprint 0.15s ease-out both; }
  .tl { animation: typeline 0.35s steps(24, end) both; }
  @keyframes lineprint { from { opacity:0; } to { opacity:1; } }
  @keyframes typeline { from { clip-path: inset(-4px 100% -4px 0); } to { clip-path: inset(-4px -4px -4px 0); } }
  @keyframes blink { 0%,49% { opacity:1; } 50%,100% { opacity:0; } }
  @media (prefers-reduced-motion: reduce) {
    .al, .tl { animation: none; }
    .cursor { animation: none; opacity:1; }
  }
</style>
